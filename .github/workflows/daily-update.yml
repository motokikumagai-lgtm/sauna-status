name: Daily Sauna Availability Update

on:
  schedule:
    # GitHub Actions cron はスキップされることがあるので、15分間隔で5回叩く
    # どれか1回でも成功すれば最新版がデプロイされる（idempotent な処理なので重複OK）
    - cron: '0 23 * * *'    # 8:00 JST
    - cron: '15 23 * * *'   # 8:15 JST
    - cron: '30 23 * * *'   # 8:30 JST
    - cron: '45 23 * * *'   # 8:45 JST
    - cron: '0 0 * * *'     # 9:00 JST
  workflow_dispatch:  # 手動実行も可能

# GitHub Pages へデプロイするための権限
# contents: write は cache-buster コミット push のため
permissions:
  contents: write
  pages: write
  id-token: write

# 同時実行を防ぐ
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      # runner は UTC なので、JST 8時に走らせると date.today() が UTC の昨日になってしまう。
      # 集計の基準日を JST に揃える。
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyyaml python-dotenv
          python -m playwright install chromium --with-deps

      - name: Create .env from secrets
        env:
          CHILLNN_EMAIL: ${{ secrets.CHILLNN_EMAIL }}
          CHILLNN_PASSWORD: ${{ secrets.CHILLNN_PASSWORD }}
        run: |
          cat > .env <<EOF
          CHILLNN_EMAIL=${CHILLNN_EMAIL}
          CHILLNN_PASSWORD=${CHILLNN_PASSWORD}
          CHILLNN_HOTEL_ID=192d3a509c089
          CHILLNN_HOTEL_NAME=sui kawahigashi sauna
          EOF

      - name: Run pipeline (DL → HTML)
        run: python src/pipeline.py

      - name: Prepare public site
        run: |
          mkdir -p public
          cp output/*.html public/
          cp output/*.png public/ 2>/dev/null || true
          if [ -d "output/demo-july" ]; then
            mkdir -p public/demo-july
            cp output/demo-july/*.html public/demo-july/ 2>/dev/null || true
            cp output/demo-july/*.png public/demo-july/ 2>/dev/null || true
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      # GitHub Pages は同じ commit SHA での再デプロイをスキップするため、
      # 毎回 SHA が変わるように小さなタイムスタンプ commit を push しておく。
      # 次回の cron 発火時（新しい SHA）に確実に publish される。
      - name: Bump cache-buster for next Pages deploy
        if: success()
        run: |
          mkdir -p .cache-buster
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .cache-buster/last-deploy
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .cache-buster/last-deploy
          git commit -m "chore: cache-buster [skip ci]" || echo "Nothing to commit"
          git push || echo "Push failed (will retry next run)"

      # 失敗時通知（SMTP_USERNAME / SMTP_PASSWORD が登録されている時のみ動作）
      - name: Notify on failure
        if: failure() && env.SMTP_USERNAME != ''
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Chillnn-STUDIO] 自動更新失敗"
          to: motokikumagai@gmail.com
          from: "Sauna Sync <${{ secrets.SMTP_USERNAME }}>"
          body: |
            Sauna空き状況の自動更新が失敗しました。
            詳細: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
