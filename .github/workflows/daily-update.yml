name: Daily Sauna Availability Update

on:
  schedule:
    # GitHub Actions の cron は時々スキップされるので、朝の時間帯に3回叩く
    # 23:00 UTC = 翌朝 8:00 JST（メイン）
    - cron: '0 23 * * *'
    # 23:30 UTC = 翌朝 8:30 JST（バックアップ1）
    - cron: '30 23 * * *'
    # 00:00 UTC = 朝 9:00 JST（バックアップ2）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行も可能

# GitHub Pages へデプロイするための権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を防ぐ
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyyaml python-dotenv
          python -m playwright install chromium --with-deps

      - name: Create .env from secrets
        env:
          CHILLNN_EMAIL: ${{ secrets.CHILLNN_EMAIL }}
          CHILLNN_PASSWORD: ${{ secrets.CHILLNN_PASSWORD }}
        run: |
          cat > .env <<EOF
          CHILLNN_EMAIL=${CHILLNN_EMAIL}
          CHILLNN_PASSWORD=${CHILLNN_PASSWORD}
          CHILLNN_HOTEL_ID=192d3a509c089
          CHILLNN_HOTEL_NAME=sui kawahigashi sauna
          EOF

      - name: Run pipeline (DL → HTML)
        run: python src/pipeline.py

      - name: Prepare public site
        run: |
          mkdir -p public
          cp output/*.html public/
          cp output/*.png public/ 2>/dev/null || true
          if [ -d "output/demo-july" ]; then
            mkdir -p public/demo-july
            cp output/demo-july/*.html public/demo-july/ 2>/dev/null || true
            cp output/demo-july/*.png public/demo-july/ 2>/dev/null || true
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      # 失敗時通知（SMTP_USERNAME / SMTP_PASSWORD が登録されている時のみ動作）
      - name: Notify on failure
        if: failure() && env.SMTP_USERNAME != ''
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Chillnn-STUDIO] 自動更新失敗"
          to: motokikumagai@gmail.com
          from: "Sauna Sync <${{ secrets.SMTP_USERNAME }}>"
          body: |
            Sauna空き状況の自動更新が失敗しました。
            詳細: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
