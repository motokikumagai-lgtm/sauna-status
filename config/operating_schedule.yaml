# 営業カレンダー設定
# ------------------------------------------------------------
# 各時間枠（部）の意味:
#   1: 10:00〜
#   2: 13:00〜
#   3: 16:00〜
#   4: 19:00〜
#
# 設定ルール:
#   - weekly_default: 曜日ごとのデフォルト営業枠
#     0=月, 1=火, 2=水, 3=木, 4=金, 5=土, 6=日
#     空配列 [] = 休業
#   - overrides: 日付指定の上書き（YYYY-MM-DD）
#     "closed" を指定すると休業
#     リスト [1,2,3] を指定するとその枠のみ営業
# ------------------------------------------------------------

weekly_default:
  0: [1, 2, 3]      # 月
  1: []             # 火（休業）
  2: [1, 2, 3]      # 水
  3: [1, 2, 3]      # 木
  4: [1, 2, 3]      # 金（標準は1〜3部、Fri Specialは別途上書き）
  5: [1, 2, 3]      # 土
  6: [1, 2, 3]      # 日

# 日付指定の上書き
# 例:
#   "2026-05-22": [1, 2, 3]   # この日は1〜3部のみ
#   "2026-06-05": [2, 3, 4]   # この日は2〜4部
#   "2026-06-15": "closed"    # 臨時休業
overrides:
  # 6月の金曜は19:00まで営業（2部〜4部）
  "2026-06-05": [2, 3, 4]
  "2026-06-12": [2, 3, 4]
  "2026-06-19": [2, 3, 4]
  "2026-06-26": [2, 3, 4]
  # 7月の金曜は19:00まで営業（2部〜4部）
  "2026-07-03": [2, 3, 4]
  "2026-07-10": [2, 3, 4]
  "2026-07-17": [2, 3, 4]
  "2026-07-24": [2, 3, 4]
  "2026-07-31": [2, 3, 4]
