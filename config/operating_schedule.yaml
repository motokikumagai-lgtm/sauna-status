# 営業カレンダー設定
# ------------------------------------------------------------
# 各時間枠（部）の意味:
#   1: 10:00〜
#   2: 13:00〜
#   3: 16:00〜
#   4: 19:00〜
#
# 設定ルール:
#   - weekly_default: 曜日ごとのデフォルト営業枠
#     0=月, 1=火, 2=水, 3=木, 4=金, 5=土, 6=日
#     空配列 [] = 休業
#   - overrides: 日付指定の上書き（YYYY-MM-DD）
#     "closed" を指定すると休業
#     リスト [1,2,3] を指定するとその枠のみ営業
# ------------------------------------------------------------

weekly_default:
  0: [1, 2, 3]      # 月（10/13/16時）
  1: []             # 火（休業）
  2: [1, 2, 3]      # 水（10/13/16時）
  3: [1, 2, 3]      # 木（10/13/16時）
  4: [2, 3, 4]      # 金（13/16/19時、1部は休み）
  5: [1, 2, 3]      # 土（10/13/16時）
  6: [1, 2, 3]      # 日（10/13/16時）

# 日付指定の上書き（臨時休業・特別営業のみ）
# 例:
#   "2026-08-13": "closed"    # 臨時休業
#   "2026-12-31": [1, 2]      # 大晦日は午前のみ
overrides:
  {}
