# 営業カレンダー設定
# ------------------------------------------------------------
# 各時間枠（部）の意味:
#   1: 10:00〜
#   2: 13:00〜
#   3: 16:00〜
#   4: 19:00〜
#
# 設定ルール:
#   - weekly_default: 曜日ごとのデフォルト営業枠
#     0=月, 1=火, 2=水, 3=木, 4=金, 5=土, 6=日
#     空配列 [] = 休業
#   - overrides: 日付指定の上書き（YYYY-MM-DD）
#     "closed" を指定すると休業
#     リスト [1,2,3] を指定するとその枠のみ営業
# ------------------------------------------------------------

weekly_default:
  0: [1, 2, 3]      # 月（10/13/16時）
  1: []             # 火（休業）
  2: [1, 2, 3]      # 水（10/13/16時）
  3: [1, 2, 3]      # 木（10/13/16時）
  4: [2, 3, 4]      # 金（13/16/19時、1部は休み）
  5: [1, 2, 3]      # 土（10/13/16時）
  6: [1, 2, 3]      # 日（10/13/16時）

# 日付指定の上書き（臨時休業・特別営業のみ）
# 例:
#   "2026-08-13": "closed"    # 臨時休業
#   "2026-12-31": [1, 2]      # 大晦日は午前のみ
overrides:
  # 金曜の2〜4部シフトは6月から。5月中の残り金曜は1〜3部。
  "2026-05-29": [1, 2, 3]
  # 火曜は通常休業だが、5/26 と 6/2 は例外的に営業（1〜3部）
  "2026-05-26": [1, 2, 3]
  "2026-06-02": [1, 2, 3]
  # 6月の金曜は1〜4部の全部営業（weekly_default の 2〜4部に 1部 を追加）
  "2026-06-05": [1, 2, 3, 4]
  "2026-06-12": [1, 2, 3, 4]
  "2026-06-19": [1, 2, 3, 4]
  "2026-06-26": [1, 2, 3, 4]
  # 7月の金曜も1〜4部営業（8月以降は未定なので weekly_default は変えず override で対応）
  "2026-07-03": [1, 2, 3, 4]
  "2026-07-10": [1, 2, 3, 4]
  "2026-07-17": [1, 2, 3, 4]
  "2026-07-24": [1, 2, 3, 4]
  "2026-07-31": [1, 2, 3, 4]
  # 火曜例外営業
  "2026-07-14": [2, 3]         # 2部・3部のみ (13時/16時)
  "2026-08-11": [1, 2, 3]
